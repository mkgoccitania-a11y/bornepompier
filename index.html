<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>BornePompier — Top 5 + Itinéraire + Login + Camions + Lock + Fin intervention</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet Routing Machine (OSRM) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css">
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

  <style>
    body { margin:0; font-family: Arial, sans-serif; }
    #map { height:100vh; width:100%; }

    #uiPanel{
      position:absolute; top:12px; left:12px;
      z-index:1200;
      width:min(920px, calc(100% - 24px));
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(255,255,255,.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius:16px;
      padding:14px;
      box-shadow:0 18px 50px rgba(0,0,0,.20);
      max-height: calc(100vh - 24px);
      overflow: auto;
    }

    #topbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    #topbar h2{ font-size: 18px; margin:0; }
    #logoutBtn { margin-left:auto; display:none; } /* Désactivé par design */
    #endInterBtn { margin-left:auto; display:none; }

    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    input{
      padding:10px; width:min(560px, 100%); font-size:16px;
      border: 1px solid #e8e8e8; border-radius: 12px; outline: none;
      background:#fff;
    }
    button{
      padding:10px 14px; font-size:16px; cursor:pointer;
      border: 1px solid #e8e8e8; background:#fff; border-radius: 12px;
    }
    button:disabled{ opacity:.6; cursor:not-allowed; }

    #status { margin-top:10px; color:#444; white-space:pre-wrap; }
    #miniStatus { margin-top:6px; font-size:12px; color:#666; white-space:pre-wrap; }

    #results{
      margin-top: 12px;
      border-radius: 14px;
      overflow:hidden;
      background: rgba(255,255,255,.85);
      box-shadow: 0 10px 26px rgba(0,0,0,.12);
    }
    .item { padding: 12px; border-bottom: 1px solid rgba(0,0,0,.06); }
    .item:last-child { border-bottom:none; }
    .item.reco { background: rgba(50,205,50,.12); }

    /* ✅ sélection locale (camion courant) */
    .item.selected{
      outline: 3px solid rgba(255,165,0,.95);
      background: rgba(255,165,0,.12);
    }

    /* ✅ borne "occupée" par un autre camion */
    .item.locked{
      background: rgba(255,0,0,.07);
    }

    .title { font-weight: 700; }
    .meta { margin-top:6px; color:#555; font-size:14px; line-height:1.35; }
    .actions { margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; }
    .pill { display:inline-block; padding:2px 8px; border:1px solid rgba(0,0,0,.12); border-radius:999px; font-size:12px; color:#444; margin-right:6px; }

    #navPanel { margin-top: 12px; border:1px solid rgba(0,0,0,.10); border-radius: 14px; padding: 10px; background: rgba(255,255,255,.85); }
    #navPanel h4 { margin: 0 0 8px 0; }
    #navPanel ol { margin: 0; padding-left: 20px; }

    .badge { display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border:1px solid rgba(0,0,0,.10); border-radius:999px; background: rgba(0,0,0,.04); }

    .hydrant-icon{
      font-size: 30px;
      line-height: 38px;
      text-align: center;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.25));
    }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; z-index: 9999; }
    .modal { background:#fff; width:min(520px, 92vw); border-radius: 14px; padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,.25); }
    .modal h3 { margin: 0 0 10px 0; }
    .modal p { margin: 6px 0 12px 0; color:#444; }
    .modal label { display:block; font-size: 13px; color:#333; margin-top:10px; }
    .modal input { width: 100%; box-sizing:border-box; }
    .modal .row { justify-content:flex-end; margin-top:12px; }
  </style>
</head>

<body>
  <div id="map"></div>

  <div id="uiPanel">
    <div id="topbar">
      <h2>🚒 BornePompier</h2>

      <button id="btnLoadTrucks">Afficher / Rafraîchir camions</button>
      <button id="btnHideTrucks">Masquer camions</button>

      <div class="badge" id="truckBadge" style="display:none;"></div>

      <button id="endInterBtn">Fin d’intervention</button>
      <button id="logoutBtn">Déconnexion</button>
    </div>

    <p style="margin:8px 0 0; color:#444;">
      Adresse intervention → Top 5 bornes → itinéraire dans la page. (Choisir = enregistre + route + lock)
    </p>

    <div class="row" style="margin-top:10px;">
      <input id="address" placeholder="Adresse intervention (ex: 18 rue Jeanne la Corsaire, Nantes)" />
      <button id="btnSearch">Rechercher</button>
    </div>

    <div id="status"></div>
    <div id="miniStatus"></div>

    <div id="navPanel" style="display:none;">
      <h4>🧭 Itinéraire</h4>
      <div id="navSummary" style="color:#444; margin-bottom:8px;"></div>
      <ol id="navSteps"></ol>
    </div>

    <div id="results"></div>
  </div>

  <div class="overlay" id="loginOverlay">
    <div class="modal">
      <h3>🔐 Connexion camion</h3>
      <p>Identifie le camion pour tracer les choix. (MVP : identifiant + PIN)</p>

      <label>Camion (ex: CCF-01)</label>
      <input id="truckId" placeholder="CCF-01" autocomplete="username" />

      <label>PIN</label>
      <input id="truckPin" placeholder="••••" type="password" autocomplete="current-password" />

      <div class="row">
        <button id="loginBtn">Se connecter</button>
      </div>

      <div id="loginStatus" style="margin-top:10px; color:#b00;"></div>
    </div>
  </div>

<script>
  // =========================
  // URLs n8n
  // =========================
  const N8N_TOP5_URL      = "https://bornepompier.app.n8n.cloud/webhook/top5-bornes";
  const N8N_LOGIN_URL     = "https://bornepompier.app.n8n.cloud/webhook/login";
  const N8N_CHOOSE_URL    = "https://bornepompier.app.n8n.cloud/webhook/choose";
  const N8N_END_URL       = "https://bornepompier.app.n8n.cloud/webhook/end-intervention";
  const N8N_CHOICES_GET   = "https://bornepompier.app.n8n.cloud/webhook/choices-get";

  const N8N_TRUCKS_UPDATE_URL = "https://bornepompier.app.n8n.cloud/webhook/trucks-update";
  const N8N_TRUCKS_GET_URL    = "https://bornepompier.app.n8n.cloud/webhook/trucks-get";

  // =========================
  // State
  // =========================
  let map = null;
  let markersLayer = null;
  let routingControl = null;
  let lastUserLatLon = null;

  let myTruckMarker = null;
  const truckMarkers = {}; // {name: marker}

  const borneMarkers = {}; // borneId -> marker
  let lastResults = [];
  let selectedBorneId = localStorage.getItem("bp_selected_borne") || "";

  // {borneId: {truck_id, charge_id, ts}}
  let choicesByBorne = {};

  // ✅ session : charge_id (pas intervention_id)
  let session = {
    token: localStorage.getItem("bp_token") || "",
    truck_id: localStorage.getItem("bp_truck_id") || "",
    charge_id: localStorage.getItem("bp_charge_id") || ""
  };

  function setStatus(msg) { document.getElementById("status").innerText = msg || ""; }
  function setMini(msg) { document.getElementById("miniStatus").innerText = msg || ""; }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, m => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
  }

  // =========================
  // Icons
  // =========================
  const FIRE_TRUCK_ICON_URL = "https://cdn-icons-png.flaticon.com/512/4325/4325959.png";
  const truckIcon = L.icon({
    iconUrl: FIRE_TRUCK_ICON_URL,
    iconSize: [46, 46],
    iconAnchor: [23, 46],
    popupAnchor: [0, -42]
  });

  const hydrantIcon = L.divIcon({
    className: "hydrant-icon",
    html: "🧯",
    iconSize: [38, 38],
    iconAnchor: [19, 19]
  });

  // =========================
  // Map
  // =========================
  function initMap(centerLat, centerLon) {
    if (map) map.remove();
    map = L.map("map").setView([centerLat, centerLon], 14);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    markersLayer = L.layerGroup().addTo(map);
  }

  function normalizeResults(data) {
    if (Array.isArray(data)) return data;
    if (typeof data === "string") {
      try { return normalizeResults(JSON.parse(data)); } catch { return []; }
    }
    if (data && typeof data === "object" && "results" in data) return normalizeResults(data.results);
    return [];
  }

  function showNavPanel(show) {
    document.getElementById("navPanel").style.display = show ? "block" : "none";
  }

  function clearRoute() {
    showNavPanel(false);
    document.getElementById("navSteps").innerHTML = "";
    document.getElementById("navSummary").innerText = "";
    if (routingControl) {
      try { map.removeControl(routingControl); } catch {}
      routingControl = null;
    }
  }

  function formatMeters(m) {
    if (m == null) return "-";
    if (m < 1000) return `${Math.round(m)} m`;
    return `${(m/1000).toFixed(1)} km`;
  }

  // =========================
  // Routing (OSRM)
  // =========================
  function buildRouteTo(lat, lon) {
    if (!lastUserLatLon) {
      alert("Adresse utilisateur non connue. Fais une recherche d’adresse d’abord.");
      return;
    }
    clearRoute();

    routingControl = L.Routing.control({
      waypoints: [
        L.latLng(lastUserLatLon.lat, lastUserLatLon.lon),
        L.latLng(lat, lon),
      ],
      router: L.Routing.osrmv1({ serviceUrl: "https://router.project-osrm.org/route/v1" }),
      addWaypoints: false,
      draggableWaypoints: false,
      fitSelectedRoutes: true,
      show: false,
      lineOptions: { styles: [{ opacity: 0.9, weight: 6 }] },
      createMarker: function(i, wp) { return L.marker(wp.latLng); }
    }).addTo(map);

    routingControl.on('routesfound', function(e) {
      const route = e.routes?.[0];
      if (!route) return;

      const sum = route.summary || {};
      document.getElementById("navSummary").innerText =
        `Distance: ${formatMeters(sum.totalDistance)} — Durée: ${Math.round((sum.totalTime||0)/60)} min`;

      const stepsEl = document.getElementById("navSteps");
      stepsEl.innerHTML = "";
      const legs = route.legs || [];
      if (legs.length && legs[0].steps) {
        legs[0].steps.forEach(step => {
          const li = document.createElement("li");
          li.textContent = step.instruction || step.name || "Étape";
          stepsEl.appendChild(li);
        });
      } else {
        const li = document.createElement("li");
        li.textContent = "Itinéraire calculé.";
        stepsEl.appendChild(li);
      }
      showNavPanel(true);
    });

    routingControl.on('routingerror', function(err) {
      console.error(err);
      alert("Erreur calcul itinéraire. (OSRM public parfois limité).");
    });
  }

  // =========================
  // UI bornes
  // =========================
  function renderResults(results) {
    const container = document.getElementById("results");
    container.innerHTML = "";
    if (!results || results.length === 0) {
      container.innerHTML = `<div class="item">Aucune borne trouvée.</div>`;
      return;
    }

    results.forEach(r => {
      const borneId = r.borne_id || (r.ref ? String(r.ref) : (r.osm_id ? `OSM-${r.osm_id}` : "BORNE"));
      const chosen = choicesByBorne[borneId]; // {truck_id, charge_id, ts}

      const isSelected = (borneId === selectedBorneId);
      const isLockedByOther = chosen?.truck_id && session.truck_id && chosen.truck_id !== session.truck_id;

      const div = document.createElement("div");
      div.className =
        "item" +
        (r.recommended ? " reco" : "") +
        (isSelected ? " selected" : "") +
        (isLockedByOther ? " locked" : "");

      const chosenPill = chosen?.truck_id
        ? `<span class="pill">🚒 Choisie par: ${escapeHtml(chosen.truck_id)}</span>`
        : "";

      const chooseDisabled =
        (!session.truck_id || !session.charge_id) ||
        (isLockedByOther); // ✅ bloque si lock autre camion

      div.innerHTML = `
        <div class="title">🧯 ${escapeHtml(r.rank)}️⃣ ${escapeHtml(borneId)} ${r.recommended ? "⭐ Recommandée" : ""}</div>
        <div class="meta">
          <span class="pill">${escapeHtml(r.distance_m)} m</span>
          ${chosenPill}
          ${r.type ? `<span class="pill">Type: ${escapeHtml(r.type)}</span>` : ``}
          ${r.position ? `<span class="pill">Pos: ${escapeHtml(r.position)}</span>` : ``}
          ${r.diameter ? `<span class="pill">Ø: ${escapeHtml(r.diameter)}</span>` : ``}
          ${r.coupling ? `<span class="pill">Raccord: ${escapeHtml(r.coupling)}</span>` : ``}
        </div>
        <div class="actions">
          <button class="btnSee">Voir</button>
          <button class="btnRoute">Itinéraire</button>
          <button class="btnChoose" ${chooseDisabled ? "disabled" : ""}>
            ${isLockedByOther ? "Occupée" : "Choisir"}
          </button>
        </div>
      `;

      div.querySelector(".btnSee").addEventListener("click", () => focusOn(r.lat, r.lon, borneId));
      div.querySelector(".btnRoute").addEventListener("click", () => routeTo(r.lat, r.lon));
      div.querySelector(".btnChoose").addEventListener("click", () => {
        if (chooseDisabled) {
          if (isLockedByOther) alert("Borne déjà choisie par " + chosen.truck_id);
          else alert("Tu dois être connecté (session active).");
          return;
        }
        chooseBorne(borneId, r.lat, r.lon, r.osm_id || null);
      });

      container.appendChild(div);
    });
  }

  function focusOn(lat, lon, borneId) {
    if (!map) return;
    map.setView([lat, lon], 17);
    setStatus("📍 " + borneId);
    borneMarkers[borneId]?.openPopup?.();
  }

  function routeTo(lat, lon) { buildRouteTo(lat, lon); }

  // =========================
  // Choisir borne (lock + route)
  // =========================
  async function chooseBorne(borneId, lat, lon, osm_id) {
    if (!session.truck_id || !session.charge_id) {
      alert("Tu dois être connecté (session active).");
      showLogin(false);
      return;
    }

    // Si lock autre camion, on bloque
    const chosen = choicesByBorne[borneId];
    if (chosen?.truck_id && chosen.truck_id !== session.truck_id) {
      alert("Borne déjà choisie par " + chosen.truck_id);
      return;
    }

    setStatus("✅ Borne choisie : " + borneId + " — Enregistrement + itinéraire…");

    // UI optimiste
    selectedBorneId = borneId;
    localStorage.setItem("bp_selected_borne", borneId);

    choicesByBorne[borneId] = { truck_id: session.truck_id, charge_id: session.charge_id, ts: new Date().toISOString() };
    renderResults(lastResults);

    // 1) serveur
    try {
      const res = await fetch(N8N_CHOOSE_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          ...(session.token ? { "Authorization": "Bearer " + session.token } : {})
        },
        body: JSON.stringify({
          truck_id: session.truck_id,
          charge_id: session.charge_id,
          borne_id: borneId,
          lat, lon, osm_id
        })
      });
      const txt = await res.text();
      if (!res.ok) throw new Error(txt || ("HTTP " + res.status));
    } catch (e) {
      console.warn("choose webhook failed", e);
      alert("Erreur enregistrement CHOOSE (voir console).");
    }

    // 2) route + zoom
    buildRouteTo(lat, lon);
    map.setView([lat, lon], 16);
    borneMarkers[borneId]?.openPopup?.();

    // 3) refresh global
    refreshChoices();
  }

  // =========================
  // Search Top5
  // =========================
  async function search() {
    const address = document.getElementById("address").value.trim();
    if (!address) { setStatus("⚠️ Entre une adresse."); return; }

    if (!session.truck_id || !session.charge_id) {
      setStatus("⚠️ Connecte-toi d’abord (session active).");
      showLogin(false);
      return;
    }

    setStatus("⏳ Recherche en cours…");
    document.getElementById("btnSearch").disabled = true;

    try {
      const res = await fetch(N8N_TOP5_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          ...(session.token ? { "Authorization": "Bearer " + session.token } : {})
        },
        body: JSON.stringify({
          address,
          truck_id: session.truck_id,
          charge_id: session.charge_id
        })
      });

      const rawText = await res.text();
      if (!res.ok) throw new Error("Webhook HTTP " + res.status + "\n" + rawText);

      let data;
      try { data = JSON.parse(rawText); } catch { data = rawText; }
      const results = normalizeResults(data);
      lastResults = results;

      await geocodeClientForOrigin(address);

      await refreshChoices();

      markersLayer.clearLayers();
      clearRoute();

      for (const k of Object.keys(borneMarkers)) delete borneMarkers[k];

      if (!results.length) {
        setStatus("Aucune borne trouvée.\n\nDebug réponse brute :\n" + rawText);
        renderResults([]);
        return;
      }

      results.forEach(r => {
        const borneId = r.borne_id || (r.ref ? String(r.ref) : (r.osm_id ? `OSM-${r.osm_id}` : "BORNE"));
        const chosen = choicesByBorne[borneId];
        const chosenLine = chosen?.truck_id ? `<br><b>🚒 Choisie par: ${escapeHtml(chosen.truck_id)}</b>` : "";

        const popup =
          `<b>🧯 ${escapeHtml(borneId)}</b>` +
          chosenLine +
          `<br>${escapeHtml(r.distance_m)} m` +
          `<br><button class="pRoute">Itinéraire</button>` +
          `<br><button class="pChoose">Choisir</button>`;

        const marker = L.marker([r.lat, r.lon], { icon: hydrantIcon })
          .addTo(markersLayer)
          .bindPopup(popup);

        marker.on("popupopen", (e) => {
          const el = e.popup.getElement();
          if (!el) return;

          const btnR = el.querySelector(".pRoute");
          const btnC = el.querySelector(".pChoose");

          btnR?.addEventListener("click", () => routeTo(r.lat, r.lon));

          btnC?.addEventListener("click", () => {
            const ch = choicesByBorne[borneId];
            if (ch?.truck_id && ch.truck_id !== session.truck_id) {
              alert("Borne déjà choisie par " + ch.truck_id);
              return;
            }
            if (!session.truck_id || !session.charge_id) {
              alert("Tu dois être connecté.");
              showLogin(false);
              return;
            }
            chooseBorne(borneId, r.lat, r.lon, r.osm_id || null);
          });
        });

        borneMarkers[borneId] = marker;

        if (borneId === selectedBorneId) marker.openPopup();
      });

      setStatus("✅ Top 5 affiché. (" + results.length + " résultats)");
      renderResults(results);
    } catch (e) {
      setStatus("❌ " + (e?.message || e));
    } finally {
      document.getElementById("btnSearch").disabled = false;
    }
  }

  async function geocodeClientForOrigin(address) {
    try {
      const url = "https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&q=" + encodeURIComponent(address);
      const res = await fetch(url, { headers: { "Accept": "application/json" } });
      const arr = await res.json();
      if (!arr?.[0]) return;
      lastUserLatLon = { lat: Number(arr[0].lat), lon: Number(arr[0].lon) };
    } catch {}
  }

  // =========================
  // Choices refresh
  // =========================
  async function refreshChoices() {
    try {
      const res = await fetch(N8N_CHOICES_GET, { cache: "no-store" });
      const text = await res.text();
      if (!res.ok) throw new Error(text || ("HTTP " + res.status));

      let data; try { data = JSON.parse(text); } catch { data = []; }
      if (!Array.isArray(data)) data = [];

      const obj = {};
      for (const c of data) {
        if (!c?.borne_id || !c?.truck_id) continue;
        obj[String(c.borne_id)] = {
          truck_id: String(c.truck_id),
          charge_id: c.charge_id ? String(c.charge_id) : "",
          ts: c.ts || ""
        };
      }
      choicesByBorne = obj;

      if (lastResults.length) renderResults(lastResults);
    } catch (e) {
      console.warn("refreshChoices failed", e);
    }
  }

  // =========================
  // Login / Session
  // =========================
  function showLogin(force) {
    document.getElementById("loginOverlay").style.display = "flex";
    document.getElementById("loginStatus").innerText = "";
    if (force) {
      document.getElementById("truckId").value = "";
      document.getElementById("truckPin").value = "";
    }
  }
  function hideLogin() { document.getElementById("loginOverlay").style.display = "none"; }

  function updateTruckUI() {
    const badge = document.getElementById("truckBadge");
    const endBtn = document.getElementById("endInterBtn");

    if (session.truck_id && session.charge_id) {
      badge.style.display = "inline-flex";
      badge.innerHTML = `🚒 Camion: <b>${escapeHtml(session.truck_id)}</b> • 🧾 Charge: <b>${escapeHtml(session.charge_id)}</b>`;
      endBtn.style.display = "inline-block";
    } else if (session.truck_id) {
      badge.style.display = "inline-flex";
      badge.innerHTML = `🚒 Camion: <b>${escapeHtml(session.truck_id)}</b> • (pas de session active)`;
      endBtn.style.display = "none";
    } else {
      badge.style.display = "none";
      endBtn.style.display = "none";
    }
  }

  async function doLogin() {
    const truck_id = document.getElementById("truckId").value.trim();
    const pin = document.getElementById("truckPin").value.trim();
    const statusEl = document.getElementById("loginStatus");

    if (!truck_id || !pin) { statusEl.innerText = "Entre camion + PIN."; return; }

    statusEl.style.color = "#444";
    statusEl.innerText = "Connexion…";

    try {
      const res = await fetch(N8N_LOGIN_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ truck_id, pin })
      });
      const text = await res.text();
      if (!res.ok) throw new Error(text || ("HTTP " + res.status));
      let data; try { data = JSON.parse(text); } catch { data = {}; }

      if (!data.ok) {
        statusEl.style.color = "#b00";
        statusEl.innerText = data.message || "Identifiants invalides.";
        return;
      }

      // ✅ IMPORTANT: charge_id (pas intervention_id)
      session = {
        truck_id: data.truck_id || truck_id,
        token: data.token || "",
        charge_id: data.charge_id || ""
      };

      localStorage.setItem("bp_truck_id", session.truck_id);
      localStorage.setItem("bp_token", session.token);
      localStorage.setItem("bp_charge_id", session.charge_id);

      hideLogin();
      updateTruckUI();
      setStatus("✅ Connecté: " + session.truck_id + "\nSession active: " + session.charge_id + "\nEntre une adresse puis clique sur Rechercher.");

      refreshChoices();
    } catch (e) {
      statusEl.style.color = "#b00";
      statusEl.innerText = "Erreur login: " + (e?.message || e);
    }
  }

  // ✅ fin d’intervention = seule façon de “déconnecter”
  async function endIntervention() {
    if (!session.truck_id || !session.charge_id) return;
    if (!confirm("Fin d’intervention ? Cela libère la borne et ferme la session.")) return;

    try {
      const res = await fetch(N8N_END_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          ...(session.token ? { "Authorization": "Bearer " + session.token } : {})
        },
        body: JSON.stringify({
          truck_id: session.truck_id,
          charge_id: session.charge_id
        })
      });
      const txt = await res.text();
      if (!res.ok) throw new Error(txt || ("HTTP " + res.status));
    } catch (e) {
      alert("Erreur fin d’intervention (voir console).");
      console.warn(e);
      return;
    }

    // purge locale
    localStorage.removeItem("bp_charge_id");
    localStorage.removeItem("bp_token");
    localStorage.removeItem("bp_selected_borne");
    localStorage.removeItem("bp_truck_id");

    session = { truck_id:"", token:"", charge_id:"" };
    selectedBorneId = "";
    lastResults = [];
    choicesByBorne = {};
    renderResults([]);
    markersLayer?.clearLayers?.();
    clearRoute();

    updateTruckUI();
    showLogin(true);
    setStatus("✅ Intervention terminée. Reconnecte un camion pour une nouvelle intervention.");
    refreshChoices();
  }

  // =========================
  // Camion GPS + camions on demand
  // =========================
  function startTruckTracking() {
    if (!navigator.geolocation) {
      setMini("GPS non supporté.");
      return;
    }

    navigator.geolocation.watchPosition(async (pos) => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      if (!myTruckMarker) {
        myTruckMarker = L.marker([lat, lon], { icon: truckIcon })
          .addTo(map)
          .bindPopup("🚒 " + (session.truck_id || "Camion"));
      } else {
        myTruckMarker.setLatLng([lat, lon]);
      }

      if (session.truck_id) {
        fetch(N8N_TRUCKS_UPDATE_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: session.truck_id, lat, lon })
        }).catch(() => {});
      }

      setMini(`GPS OK • ${session.truck_id || "non connecté"} • lat ${lat.toFixed(5)} lon ${lon.toFixed(5)}`);
    }, (err) => {
      setMini("GPS bloqué/refusé: " + err.message);
    }, { enableHighAccuracy: true });
  }

  async function loadTrucksOnce() {
    const btn = document.getElementById("btnLoadTrucks");
    btn.disabled = true;
    const oldText = btn.innerText;
    btn.innerText = "Chargement…";

    try {
      const res = await fetch(N8N_TRUCKS_GET_URL, { cache: "no-store" });
      const text = await res.text();
      if (!res.ok) throw new Error("HTTP " + res.status + " — " + text);

      let data;
      try { data = JSON.parse(text); } catch { data = []; }
      if (!Array.isArray(data)) data = [];

      const seen = new Set();

      for (const t of data) {
        const name = t?.name || t?.truck_id;
        const lat = t?.lat;
        const lon = t?.lon;
        if (!name || lat == null || lon == null) continue;

        seen.add(name);

        if (!truckMarkers[name]) {
          truckMarkers[name] = L.marker([lat, lon], { icon: truckIcon })
            .addTo(map)
            .bindPopup("🚒 " + name);
        } else {
          truckMarkers[name].setLatLng([lat, lon]);
        }
      }

      for (const name of Object.keys(truckMarkers)) {
        if (!seen.has(name)) {
          map.removeLayer(truckMarkers[name]);
          delete truckMarkers[name];
        }
      }

      setMini(`✅ trucks-get OK • ${data.length} camions reçus • ${Object.keys(truckMarkers).length} affichés`);
    } catch (e) {
      console.error(e);
      setMini("❌ trucks-get erreur: " + (e?.message || e));
      alert("Erreur trucks-get. Ouvre la console (F12) pour voir le détail.");
    } finally {
      btn.disabled = false;
      btn.innerText = oldText;
    }
  }

  function hideTrucks() {
    for (const name of Object.keys(truckMarkers)) {
      map.removeLayer(truckMarkers[name]);
      delete truckMarkers[name];
    }
    setMini("🧹 Camions masqués.");
  }

  // =========================
  // Init
  // =========================
  document.getElementById("btnSearch").addEventListener("click", search);
  document.getElementById("address").addEventListener("keydown", (e) => { if (e.key === "Enter") search(); });
  document.getElementById("loginBtn").addEventListener("click", doLogin);
  document.getElementById("endInterBtn").addEventListener("click", endIntervention);

  document.getElementById("btnLoadTrucks").addEventListener("click", loadTrucksOnce);
  document.getElementById("btnHideTrucks").addEventListener("click", hideTrucks);

  initMap(48.8566, 2.3522);
  updateTruckUI();

  // polling locks/choices
  setInterval(refreshChoices, 5000);
  refreshChoices();

  if (!session.truck_id || !session.charge_id) showLogin(false);
  else setStatus("Connecté: " + session.truck_id + "\nSession: " + session.charge_id + "\nEntre une adresse puis clique sur Rechercher.");

  startTruckTracking();
</script>
</body>
